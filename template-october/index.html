<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TI Moving - Верстка Навбара</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">

<style>
    /* 1. Обнуление стилей — чтобы браузер не добавлял свои лишние отступы */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    /* Глобальные переменные: один раз меняешь здесь — меняется везде */
    :root {
        --bg-dark: #0F0F0F;
        --primary-red: #C62121; /* Основной цвет из Figma (кнопки, лого) */
        --text-white: #FFFFFF;
        --font-main: 'Manrope', sans-serif;
    }

    body {
        height: 2000px; /* Это просто чтобы появилась полоса прокрутки */
        background-color: var(--bg-dark);
        color: var(--text-white);
        font-family: var(--font-main);
        -webkit-font-smoothing: antialiased; /* Делает шрифт более четким (тонким) */
    }

    /* 2. Контейнер: ограничивает контент по бокам, чтобы он не разъезжался на весь экран */
    .container {
        width: 100%;
        max-width: 1400px;     /* Ширина из Figma. Если макет уже — уменьшай это число */
        margin: 0 auto;
        padding: 0 10px;
    }

    /* 3. Шапка (Весь черный блок сверху) */
    /* 3. Шапка */
.header {
    width: 100%;
    height: 145px;
    display: flex;
    align-items: center;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 1000;

    /* Начальное состояние: полностью прозрачно */
    background: transparent;
    border-bottom: 1px solid transparent;

    /* Плавность перехода (0.4 секунды) */
    transition: all 0.4s ease;
}

/* Это состояние включится при скролле через JavaScript */
.header.scrolled {
    height: 90px; /* При скролле шапку лучше сделать чуть компактнее */
    background: rgba(15, 15, 15, 0.7); /* Полупрозрачный темный фон */
    backdrop-filter: blur(15px);      /* Эффект матового стекла */
    -webkit-backdrop-filter: blur(15px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.1); /* Тонкая линия проявляется */
}

    /* Обертка для навигации внутри контейнера */
    .nav-wrapper {
        display: flex;
        justify-content: space-between; /* Расталкивает Лого, Меню и Акшены по краям */
        align-items: center;
        width: 100%;
    }

    /* Блок Логотипа */
    .logo {
        flex: 0 0 auto;        /* Говорит логотипу: "Не сжимайся и не растягивайся" */
        display: flex;
        flex-direction: column; /* Ставит иконку и надпись Since 2025 друг под друга */
        align-items: center;
        text-decoration: none;
        color: inherit;
    }
    .logo img {
        height: 81px;          /* Высота картинки логотипа */
        width: 68px;
    }
    /* Меню навигации (Services, About Us и т.д.) */
    .menu {
        flex: 1;
        display: flex;
        justify-content: center;
        gap:   55px;             /* Расстояние МЕЖДУ пунктами меню в Figma */
    }

    .menu__link {
        text-decoration: none;
        color: var(--text-white);
        font-size: 17px;       /* Размер шрифта из твоих данных Figma */
        font-weight: 400;      /* Жирность шрифта (Regular) */
        transition: opacity 0.3s; /* Плавность при наведении */
    }
    .menu__link:hover {
        opacity: 0.6;          /* Эффект прозрачности при наведении курсора */
    }

    /* Правая часть (Телефон + Кнопка + Поиск) */
    .actions {
        flex: 0 0 auto;
        display: flex;
        gap: 25px;             /* Расстояние между телефоном и кнопкой */
    }

    .phone {
        display: flex;
        align-items: center;
        gap: 8px;              /* Расстояние между иконкой трубки и номером */
        text-decoration: none;
        color: var(--text-white);
        font-size: 17px;
    }
    .phone img {
        width: 20px;           /* Точный размер иконки трубки */
        height: 20px;
    }

    /* Кнопка "Get a Quote" */
    .btn-quote {
        background-color: var(--primary-red);
        color: #FFFFFF;
        text-decoration: none;
        height: 38px;
        padding: 0 54px;       /* Внутренние отступы (ширина кнопки зависит от текста) */
        border-radius: 60px;
        display: flex;
        align-items: center;
        font-weight: 600;      /* Жирность текста (Semi-bold) */
        font-size: 17px;
        transition: transform 0.2s, background 0.3s;
    }
    .btn-quote:hover {
        background-color: #A51B1B; /* Цвет становится чуть темнее при наведении */
        transform: translateY(-1px); /* Кнопка слегка "подпрыгивает" */
    }

    /* Кнопка поиска (Лупа) */
    .search-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1.5px solid rgba(255, 255, 255, 0.29);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    margin-left: -15px; /* Магия: двигает лупу ЕЩЕ ближе к красной кнопке, не трогая телефон */
}

    /* Отступ основного контента */
    .main-content {
        margin-top: 100px;     /* Чтобы контент не заезжал под фиксированную шапку */
        text-align: center;
    }

    /* Контейнер для пункта с выпадашкой */
.menu__item {
    position: relative; /* Чтобы окошко позиционировалось относительно этого пункта */
    padding-bottom: 20px; /* Технический отступ, чтобы мышка не "теряла" окно при переходе */
    margin-bottom: -20px;
}

/* Стили самого белого окошка */
/* 1. Уменьшаем само белое окно (padding) */
.dropdown {
    position: absolute;
    width: 265.4px;         /* Ширина по Figma */
    background: #FFFFFF;    /* Фон */
    border-radius: 10px;    /* Скругление */
    top: 86.4px;            /* Позиция сверху по Figma */
    left: -20px;

    /* Уменьшили внутренний отступ окна, чтобы текст был ближе к краям */
    padding: 10px;

    opacity: 0;
    visibility: hidden;
    transition: all 0.3s ease;
    z-index: 1001;
    box-shadow: 0px 8px 20px rgba(0,0,0,0.1);
}

/* 2. Убираем все лишнее у списка */
.dropdown ul {
    list-style: none;
    margin: 0;
    padding: 0;
}

/* 3. Настройка самих строк (пунктов) */
.dropdown li a {
    display: block;

    /* ПЕРВЫЙ ЦИФРА (5px) — уменьшает расстояние МЕЖДУ строками */
    /* ВТОРАЯ ЦИФРА (10px) — это отступ слева (тот самый абзац) */
    padding: 3px 10px;

    color: #151515;         /* Цвет текста из макета */
    font-family: 'Manrope', sans-serif;
    font-weight: 400;       /* Regular */
    font-size: 17px;        /* Размер из Figma */
    text-decoration: none;
    line-height: 1.2;       /* Делает строки более прижатыми друг к другу */
    transition: background 0.2s;
    border-radius: 5px;
}

/* Эффект при наведении на конкретную строку */
.dropdown li a:hover {
    background: #f9f9f9;
    color: var(--primary-red);
}

/* Показываем при наведении */
.menu__item:hover .dropdown {
    opacity: 1;
    visibility: visible;
    top: 50px; /* Легкая анимация всплытия */
}

/* Список внутри окошка */
.dropdown__list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 5px; /* Расстояние между строками */
}

.dropdown__list li a {
    text-decoration: none;
    font-family: 'Manrope', sans-serif;
    font-weight: 400;
    font-size: 17px;
    line-height: 100%;
    color: #151515; /* Твой цвет текста из Figma */
    transition: color 0.2s;
}

.dropdown__list li a:hover {
    color: var(--primary-red); /* Подсветим красным при наведении на пункт */
}
</style>

</head>
<body>

    <header class="header">
        <div class="container">
            <div class="nav-wrapper">

                <a href="/" class="logo">
    <img src="themes/demo/assets/images/Group 1597878737.png" alt="TI Moving Logo">
</a>

                <nav class="menu">
    <div class="menu__item">
        <a href="#" class="menu__link">Services</a>

        <div class="dropdown">
            <ul class="dropdown__list">
                <li><a href="#">Local Moving</a></li>
                <li><a href="#">Long Distance Moving</a></li>
                <li><a href="#">Office / Commercial Moving</a></li>
                <li><a href="#">Packing Services</a></li>
                <li><a href="#">Storage Solutions</a></li>
            </ul>
        </div>
    </div>

    <a href="#" class="menu__link">About Us</a>
    <a href="#" class="menu__link">Gallery</a>
    <a href="#" class="menu__link">Reviews</a>
    <a href="#" class="menu__link">Contact Us</a>
</nav>

                <div class="actions">
                    <a href="tel:+77777777777" class="phone">
    <img src="themes/demo/assets/images/Group 1597878739.png" alt="Phone Icon">
    <span>+ 7 (777) 777–77–77</span>
</a>

                    <a href="#" class="btn-quote">Get a Quote</a>

                    <button class="search-btn">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
    </svg>
</button>
                </div>

            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <h1 style="color: #fff; font-size: 48px;">Шапка готова!</h1>
            <p style="opacity: 0.7;">Теперь давай делать Hero-секцию.</p>
        </div>
    </main>


<script>
    const header = document.querySelector('.header');

    window.addEventListener('scroll', () => {
        // Если прокрутили больше чем на 50 пикселей вниз
        if (window.scrollY > 50) {
            header.classList.add('scrolled');
        } else {
            header.classList.remove('scrolled');
        }
    });
</script>
</body>
</html>
